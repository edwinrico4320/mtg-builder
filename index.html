<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MTG Builder v8.0.2</title>

<link rel="stylesheet" href="assets/css/builder.css">
<link rel="stylesheet" href="assets/css/v8.css">
<link rel="stylesheet" href="assets/css/image-lab.css">

</head>

<body>

<div id="version-info" class="version-banner">
Loading version...
</div>

<div id="module-status" class="v8-module-status">
Loading modules...
</div>

<hr>

<nav class="tabs">
<button data-tab="catalog">Catalog Builder</button>
<button data-tab="downloader">Set Downloader</button>
<button data-tab="batch">Batch Builder</button>
<button data-tab="image-lab">Image Lab</button>
</nav>

<section id="catalog" class="panel">
<h2>Catalog Builder</h2>
<p>Existing catalog builder panel loads here.</p>
</section>

<section id="downloader" class="panel">
<h2>Set Downloader</h2>
<p>Existing downloader panel loads here.</p>
</section>

<section id="batch" class="panel">
<h2>Batch Builder</h2>
<p>Existing batch builder panel loads here.</p>
</section>

<section id="image-lab" class="panel image-lab-panel">

<h2>Image Lab v8.0.2</h2>

<div class="image-lab-control">
<label>Test Size:</label>
<select id="image-test-size">
<option value="10">10 cards</option>
<option value="50">50 cards</option>
<option value="all">Entire set</option>
</select>
</div>

<div class="image-lab-control">
<label>Image Mode:</label>
<select id="image-mode">
<option value="embedded">Embedded</option>
<option value="external">External URL</option>
</select>
</div>

<div class="image-lab-control">
<label>Width:</label>
<select id="image-width">
<option>180</option>
<option selected>300</option>
<option>488</option>
</select>
</div>

<div class="image-lab-control">
<label>Quality:</label>
<select id="image-quality">
<option value=".55">55%</option>
<option value=".65" selected>65%</option>
<option value=".75">75%</option>
</select>
</div>

<button id="run-image-test">Run Image Test</button>

<div id="image-report" class="image-lab-report">
Waiting for test...
</div>

</section>

<script src="assets/js/version-loader.js"></script>
<script src="assets/js/module-registry.js"></script>

<script src="assets/js/image-lab.js"></script>
<script src="assets/js/image-lab-ui.js"></script>
<script src="assets/js/image-report.js"></script>

<script src="assets/js/card-index.js"></script>
<script src="assets/js/app.js"></script>

</body>
</html>
